name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lumora
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @lumora/shared-tenancy build
          pnpm --filter @lumora/shared-auth build
          pnpm --filter @lumora/domain-ai build

      - name: Typecheck API
        run: pnpm --filter @lumora/api typecheck

      - name: Migrate test database
        run: pnpm --filter @lumora/api migrate:latest
        env:
          DATABASE_URL_ADMIN: postgres://postgres:postgres@localhost:5432/lumora

      - name: Unit + RLS integration tests
        run: pnpm --filter @lumora/api test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lumora

      - name: Build admin web
        run: pnpm --filter @lumora/admin-web build
