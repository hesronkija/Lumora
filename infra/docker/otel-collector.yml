receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  # PII scrubbing: drop any span/log attribute that looks like a phone or email
  attributes:
    actions:
      - key: user.email
        action: delete
      - key: user.phone
        action: delete
      - key: db.statement
        action: hash

exporters:
  debug:
    verbosity: normal
  # In production, replace with otlp to Grafana Cloud
  otlp/grafana:
    endpoint: ${env:GRAFANA_OTLP_ENDPOINT}
    headers:
      authorization: Basic ${env:GRAFANA_OTLP_AUTH}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [debug]
